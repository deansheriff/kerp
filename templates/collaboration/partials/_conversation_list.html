<!-- Panel: Conversation list partial (loaded via HTMX) -->
<div class="divide-y divide-slate-100 dark:divide-slate-800">
    {% for conv in conversations %}
    <button @click="openConversation('{{ conv.conversation_id }}', '{{ conv.name | e }}')"
            class="flex w-full items-center gap-3 px-4 py-3 text-left transition hover:bg-slate-50 dark:hover:bg-slate-800/50">
        <div class="flex h-10 w-10 flex-shrink-0 items-center justify-center rounded-full text-xs font-semibold
            {% if conv.type == 'DIRECT' %}bg-blue-100 text-blue-600 dark:bg-blue-900/40 dark:text-blue-400
            {% elif conv.type == 'CHANNEL' %}bg-green-100 text-green-600 dark:bg-green-900/40 dark:text-green-400
            {% else %}bg-purple-100 text-purple-600 dark:bg-purple-900/40 dark:text-purple-400{% endif %}">
            {% if conv.type == 'DIRECT' %}
            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
            {% elif conv.type == 'CHANNEL' %}
            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 20l4-16m2 16l4-16M6 9h14M4 15h14"/>
            </svg>
            {% else %}
            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
            {% endif %}
        </div>
        <div class="min-w-0 flex-1">
            <div class="flex items-center justify-between">
                <h4 class="truncate text-sm font-medium text-slate-900 dark:text-white">{{ conv.name }}</h4>
                {% if conv.unread_count > 0 %}
                <span class="ml-2 flex h-5 min-w-5 items-center justify-center rounded-full bg-indigo-500 px-1.5 text-[10px] font-bold text-white">
                    {{ conv.unread_count if conv.unread_count <= 99 else '99+' }}
                </span>
                {% endif %}
            </div>
            {% if conv.last_message %}
            <p class="mt-0.5 truncate text-xs text-slate-500 dark:text-slate-400">
                <span class="font-medium">{{ conv.last_message.sender_name }}:</span>
                {{ conv.last_message.content }}
            </p>
            {% else %}
            <p class="mt-0.5 text-xs text-slate-400 dark:text-slate-500 italic">No messages yet</p>
            {% endif %}
        </div>
    </button>
    {% else %}
    <div class="px-4 py-10 text-center">
        <svg class="mx-auto h-10 w-10 text-slate-300 dark:text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
        </svg>
        <p class="mt-2 text-sm text-slate-500 dark:text-slate-400">No conversations yet</p>
        <a href="/collaboration/new-group" class="mt-2 inline-block text-xs font-medium text-indigo-500 hover:text-indigo-700 dark:text-indigo-400">
            Create a group →
        </a>
    </div>
    {% endfor %}
</div>
