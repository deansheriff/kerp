{% extends "people/base_people.html" %}

{% block page_title %}New PMS Grievance{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="card p-6">
        {% if error %}
        <div class="mb-4 rounded-lg border border-rose-200 bg-rose-50 p-3 text-sm text-rose-700 dark:border-rose-800 dark:bg-rose-900/20 dark:text-rose-300">
            {{ error }}
        </div>
        {% endif %}
        <form method="post" action="/people/perf/pms/grievances/new" class="space-y-4">
            {{ request.state.csrf_form | safe }}
            <div>
                <label class="form-label" for="title">Title</label>
                <input id="title" name="title" class="form-input" required value="{{ form_data.get('title', '') if form_data else '' }}">
            </div>
            <div>
                <label class="form-label" for="description">Description</label>
                <textarea id="description" name="description" class="form-textarea" rows="5" required>{{ form_data.get('description', '') if form_data else '' }}</textarea>
            </div>
            <div>
                <label class="form-label" for="channel">Channel</label>
                <select id="channel" name="channel" class="form-select">
                    <option value="INTERNAL">Internal</option>
                    <option value="HRM">HRM</option>
                    <option value="FCSC">FCSC</option>
                </select>
            </div>
            <div class="flex items-center justify-end gap-2 pt-3 border-t border-slate-200 dark:border-slate-700">
                <a href="/people/perf/pms/grievances" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Submit Grievance</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
