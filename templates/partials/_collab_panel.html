<!-- Collaboration slide-over panel (Intercom/Slack-style) + Mobile FAB -->
<div x-data="{
    collabOpen: false,
    collabView: 'inbox',
    activeConvId: null,
    activeConvName: '',
    unreadCount: 0,
    pollInterval: null,
    dmPickerOpen: false,
    dmSearch: '',
    dmResults: [],
    dmLoading: false,
    dmError: '',
    init() {
        this.fetchUnread();
        this.pollInterval = setInterval(() => this.fetchUnread(), 30000);
    },
    fetchUnread() {
        fetch('/collaboration/api/unread-count')
            .then(r => r.ok ? r.json() : {unread: 0})
            .then(d => { this.unreadCount = d.unread || 0; })
            .catch(() => {});
    },
    openInbox() {
        this.collabView = 'inbox';
        this.activeConvId = null;
        this.collabOpen = true;
    },
    openConversation(id, name) {
        this.activeConvId = id;
        this.activeConvName = name;
        this.collabView = 'conversation';
        this.collabOpen = true;
    },
    goBack() {
        this.collabView = 'inbox';
        this.activeConvId = null;
    },
    searchDmPeople() {
        this.dmError = '';
        if (this.dmSearch.trim().length < 2) {
            this.dmResults = [];
            this.dmLoading = false;
            return;
        }
        this.dmLoading = true;
        fetch('/collaboration/api/employees?q=' + encodeURIComponent(this.dmSearch.trim()))
            .then(r => r.ok ? r.json() : Promise.reject())
            .then(d => { this.dmResults = d.employees || []; this.dmLoading = false; })
            .catch(() => { this.dmLoading = false; this.dmError = 'Search failed'; });
    },
    startDirectMessage(personId, name) {
        const body = new FormData();
        body.append('person_id', personId);
        const csrf = document.querySelector('meta[name=&quot;csrf-token&quot;]')?.content;
        const headers = csrf ? {'X-CSRF-Token': csrf} : {};
        fetch('/collaboration/api/conversations/direct', {
            method: 'POST',
            body,
            headers,
            credentials: 'same-origin'
        })
            .then(r => r.ok ? r.json() : r.json().then(e => Promise.reject(e)))
            .then(d => {
                this.dmPickerOpen = false;
                this.dmSearch = '';
                this.dmResults = [];
                this.openConversation(d.conversation_id, name || d.name || 'Direct Message');
            })
            .catch(e => { this.dmError = e.error || 'Could not start conversation'; });
    }
}" x-cloak>

    <!-- FAB Button -->
    <button
        @click="collabOpen ? (collabOpen = false) : openInbox()"
        class="fixed bottom-6 right-6 z-[60] flex h-14 w-14 items-center justify-center rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 text-white shadow-xl shadow-indigo-500/30 transition-all hover:scale-105 hover:shadow-2xl hover:shadow-indigo-500/40 active:scale-95 print:hidden"
        :class="collabOpen ? 'rotate-0' : ''"
        aria-label="Toggle collaboration panel">
        <!-- Chat icon -->
        <svg x-show="!collabOpen" class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
        </svg>
        <!-- Close icon -->
        <svg x-show="collabOpen" class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
        <!-- Unread badge -->
        <span x-show="unreadCount > 0 && !collabOpen"
              x-text="unreadCount > 99 ? '99+' : unreadCount"
              class="absolute -top-1 -right-1 flex h-5 min-w-5 items-center justify-center rounded-full bg-red-500 px-1.5 text-[10px] font-bold text-white ring-2 ring-white dark:ring-slate-900">
        </span>
    </button>

    <!-- Backdrop (mobile) -->
    <div x-show="collabOpen"
         x-transition:enter="transition-opacity duration-200"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition-opacity duration-200"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         @click="collabOpen = false"
         class="fixed inset-0 z-[61] bg-black/30 backdrop-blur-sm lg:hidden print:hidden">
    </div>

    <!-- Panel -->
    <div x-show="collabOpen"
         x-transition:enter="transition-transform duration-300 ease-out"
         x-transition:enter-start="translate-x-full"
         x-transition:enter-end="translate-x-0"
         x-transition:leave="transition-transform duration-200 ease-in"
         x-transition:leave-start="translate-x-0"
         x-transition:leave-end="translate-x-full"
         class="fixed inset-y-0 right-0 z-[62] flex w-full flex-col border-l border-slate-200 bg-white shadow-2xl dark:border-slate-700 dark:bg-slate-900 sm:w-[420px] print:hidden"
         @keydown.escape.window="collabOpen = false">

        <!-- Panel Header -->
        <div class="flex items-center justify-between border-b border-slate-200 bg-gradient-to-r from-indigo-50 to-purple-50 px-4 py-3 dark:border-slate-700 dark:from-indigo-950/30 dark:to-purple-950/30">
            <div class="flex items-center gap-3">
                <template x-if="collabView === 'conversation'">
                    <button @click="goBack()" class="rounded-lg p-1 text-slate-500 hover:bg-white/60 hover:text-slate-700 dark:hover:bg-slate-800 dark:hover:text-slate-300">
                        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                        </svg>
                    </button>
                </template>
                <div>
                    <h2 class="text-sm font-semibold text-slate-900 dark:text-white"
                        x-text="collabView === 'inbox' ? 'Messages' : activeConvName"></h2>
                </div>
            </div>
            <div class="flex items-center gap-1">
                <a href="/collaboration" class="rounded-lg p-1.5 text-slate-400 hover:bg-white/60 hover:text-slate-600 dark:hover:bg-slate-800 dark:hover:text-slate-300" title="Open full page">
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
                    </svg>
                </a>
                <button @click="collabOpen = false" class="rounded-lg p-1.5 text-slate-400 hover:bg-white/60 hover:text-slate-600 dark:hover:bg-slate-800 dark:hover:text-slate-300">
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Panel Body (HTMX-loaded) -->
        <div class="flex-1 overflow-hidden">
            <!-- Inbox View -->
            <div x-show="collabView === 'inbox'" class="flex h-full flex-col">
                <!-- Quick Actions -->
                <div class="flex items-center gap-2 border-b border-slate-100 px-4 py-2 dark:border-slate-800">
                    <button type="button"
                            @click="dmPickerOpen = !dmPickerOpen; if (dmPickerOpen) { $nextTick(() => $refs.dmSearchInput && $refs.dmSearchInput.focus()) }"
                            class="inline-flex items-center gap-1.5 rounded-lg border border-slate-200 bg-white px-3 py-1.5 text-xs font-medium text-slate-600 transition hover:border-indigo-300 hover:bg-indigo-50 hover:text-indigo-700 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-300 dark:hover:border-indigo-700 dark:hover:bg-indigo-900/30 dark:hover:text-indigo-400">
                        <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                        </svg>
                        New DM
                    </button>
                    <a href="/collaboration/new-group"
                       class="inline-flex items-center gap-1.5 rounded-lg border border-slate-200 bg-white px-3 py-1.5 text-xs font-medium text-slate-600 transition hover:border-indigo-300 hover:bg-indigo-50 hover:text-indigo-700 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-300 dark:hover:border-indigo-700 dark:hover:bg-indigo-900/30 dark:hover:text-indigo-400">
                        <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                        </svg>
                        New Group
                    </a>
                    <a href="/collaboration/search"
                       class="inline-flex items-center gap-1.5 rounded-lg border border-slate-200 bg-white px-3 py-1.5 text-xs font-medium text-slate-600 transition hover:border-indigo-300 hover:bg-indigo-50 hover:text-indigo-700 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-300 dark:hover:border-indigo-700 dark:hover:bg-indigo-900/30 dark:hover:text-indigo-400">
                        <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                        </svg>
                        Search
                    </a>
                </div>
                <div x-show="dmPickerOpen"
                     x-transition
                     class="border-b border-slate-100 bg-slate-50/80 px-4 py-3 dark:border-slate-800 dark:bg-slate-950/40">
                    <label for="collab-dm-search" class="sr-only">Find employee</label>
                    <input id="collab-dm-search"
                           x-ref="dmSearchInput"
                           type="search"
                           x-model="dmSearch"
                           @input.debounce.250ms="searchDmPeople()"
                           autocomplete="off"
                           placeholder="Find employee"
                           class="w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm text-slate-900 outline-none transition focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 dark:border-slate-700 dark:bg-slate-900 dark:text-white dark:focus:border-indigo-500 dark:focus:ring-indigo-900/40">
                    <div class="mt-2 max-h-56 overflow-y-auto rounded-lg border border-slate-200 bg-white shadow-sm dark:border-slate-700 dark:bg-slate-900"
                         x-show="dmSearch.trim().length >= 2">
                        <div x-show="dmLoading" class="px-3 py-3 text-sm text-slate-500 dark:text-slate-400">Searching...</div>
                        <div x-show="!dmLoading && dmError" x-text="dmError" class="px-3 py-3 text-sm text-rose-600 dark:text-rose-300"></div>
                        <div x-show="!dmLoading && !dmError && dmResults.length === 0" class="px-3 py-3 text-sm text-slate-500 dark:text-slate-400">No employees found.</div>
                        <template x-for="emp in dmResults" :key="emp.person_id">
                            <button type="button"
                                    @click="startDirectMessage(emp.person_id, emp.name)"
                                    class="flex w-full items-center gap-3 px-3 py-2 text-left transition hover:bg-slate-50 dark:hover:bg-slate-800">
                                <span class="flex h-8 w-8 flex-shrink-0 items-center justify-center rounded-full bg-indigo-100 text-xs font-semibold text-indigo-700 dark:bg-indigo-900/40 dark:text-indigo-300"
                                      x-text="emp.name.split(' ').filter(Boolean).map(n => n[0]).join('').substring(0, 2).toUpperCase() || '?'"></span>
                                <span class="min-w-0">
                                    <span class="block truncate text-sm font-medium text-slate-900 dark:text-white" x-text="emp.name"></span>
                                    <span class="block truncate text-xs text-slate-500 dark:text-slate-400" x-text="emp.email"></span>
                                </span>
                            </button>
                        </template>
                    </div>
                </div>
                <!-- Conversation List (HTMX) -->
                <div class="flex-1 overflow-y-auto"
                     hx-get="/collaboration/panel/inbox"
                     hx-trigger="load, every 15s"
                     hx-swap="innerHTML">
                    <div class="flex items-center justify-center py-12">
                        <div class="h-6 w-6 animate-spin rounded-full border-2 border-indigo-500 border-t-transparent"></div>
                    </div>
                </div>
            </div>

            <!-- Conversation View -->
            <div x-show="collabView === 'conversation'" class="flex h-full flex-col">
                <div class="flex-1 overflow-y-auto"
                     hx-swap="innerHTML"
                     x-effect="if (activeConvId && collabView === 'conversation') { htmx.ajax('GET', '/collaboration/panel/conversation/' + activeConvId, {target: $el, swap: 'innerHTML'}) }">
                    <div class="flex items-center justify-center py-12">
                        <div class="h-6 w-6 animate-spin rounded-full border-2 border-indigo-500 border-t-transparent"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
